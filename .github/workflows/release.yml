# Build macOS, Linux, and Windows binaries and attach them to GitHub Releases.
# Trigger: publish a release (create a tag and release in the repo).
name: Release

on:
  release:
    types: [published]

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon (arm64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Import code signing certificate
        if: ${{ vars.SIGN_MACOS_RELEASE == 'true' }}
        env:
          CSC_LINK_B64: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK_B64" | base64 --decode -o cert.p12
          KEYCHAIN_PASSWORD=actions
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import cert.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          echo "CSC_LINK=$(pwd)/cert.p12" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build (macOS DMG)
        env:
          CSC_LINK: ${{ env.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run make

      - name: Rename artifacts
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          mkdir -p release-artifacts
          dmg=$(find out/make -type f -name "*.dmg" | head -1)
          [ -n "$dmg" ] && cp "$dmg" "release-artifacts/Scroll-Companion-${version}-macos-arm64.dmg"
          zip=$(find out/make -type f -name "*.zip" | head -1)
          [ -n "$zip" ] && cp "$zip" "release-artifacts/Scroll-Companion-${version}-macos-arm64.zip"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          for f in release-artifacts/*; do
            [ -f "$f" ] && gh release upload "$tag" "$f" --clobber
          done

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Linux .deb)
        run: npm run make

      - name: Rename artifacts
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          mkdir -p release-artifacts
          deb=$(find out/make -type f -name "*.deb" | head -1)
          [ -n "$deb" ] && cp "$deb" "release-artifacts/Scroll-Companion-${version}-linux-amd64.deb"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          for f in release-artifacts/*; do
            [ -f "$f" ] && gh release upload "$tag" "$f" --clobber
          done

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Windows Squirrel)
        run: npm run make

      - name: Rename artifacts
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          $tag = $env:RELEASE_TAG
          $version = $tag -replace '^v', ''
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          $exe = Get-ChildItem -Path out/make -Recurse -Filter "*.exe" -File | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "release-artifacts/Scroll-Companion-${version}-windows-x64-setup.exe" }

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          Get-ChildItem -Path release-artifacts -File | ForEach-Object { gh release upload $env:RELEASE_TAG $_.FullName --clobber }
