# Build macOS, Linux, and Windows binaries and attach them to GitHub Releases.
# Trigger: publish a release (create a tag and release in the repo).
name: Release

on:
  release:
    types: [published]

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon (arm64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (macOS DMG)
        run: npm run make

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          find out/make -type f -exec gh release upload "$tag" {} --clobber \;

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Linux .deb)
        run: npm run make

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          find out/make -type f -exec gh release upload "$tag" {} --clobber \;

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Windows Squirrel)
        run: npm run make

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          Get-ChildItem -Path out/make -Recurse -File | ForEach-Object { gh release upload $env:RELEASE_TAG $_.FullName --clobber }
