<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Scroll Companion</title>
		<style>
			* {
				box-sizing: border-box;
			}
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				margin: 0;
				padding: 10px 10px 8px;
				background: var(--popup-bg, #2c2c2e);
				color: var(--popup-fg, #fff);
				font-size: 13px;
				width: 380px;
				-webkit-font-smoothing: antialiased;
			}
			.row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 10px;
				padding: 8px 0;
			}
			.row:not(:first-child) {
				border-top: 1px solid rgba(255, 255, 255, 0.08);
			}
			.status {
				color: rgba(255, 255, 255, 0.6);
				font-size: 12px;
			}
			.substatus {
				color: rgba(255, 255, 255, 0.65);
				font-size: 11px;
				margin-top: 2px;
			}
			button {
				background: rgba(255, 255, 255, 0.12);
				color: inherit;
				border: none;
				border-radius: 5px;
				padding: 4px 10px;
				font-size: 11px;
				cursor: pointer;
				min-width: 82px;
				text-align: center;
			}
			button:hover {
				background: rgba(255, 255, 255, 0.18);
			}
			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			button.primary {
				background: rgba(10, 132, 255, 0.9);
				color: #fff;
			}
			button.primary:hover {
				background: rgba(10, 132, 255, 1);
			}
			.label {
				flex: 1;
			}
			.label-wrap {
				flex: 1;
				min-width: 0;
			}
			input[type="checkbox"] {
				accent-color: #0a84ff;
			}
			.progress {
				font-size: 11px;
				color: rgba(255, 255, 255, 0.5);
				margin-top: 2px;
			}
			.progress-bar {
				height: 3px;
				background: rgba(255, 255, 255, 0.15);
				border-radius: 2px;
				overflow: hidden;
				margin-top: 4px;
			}
			.progress-fill {
				height: 100%;
				background: rgba(255, 255, 255, 0.4);
				width: 0%;
				transition: width 0.15s;
			}
			.popup-title {
				font-weight: 600;
				font-size: 14px;
				padding-bottom: 10px;
				margin-bottom: 4px;
				border-bottom: 1px solid rgba(255, 255, 255, 0.12);
			}
			.row.actions {
				justify-content: flex-end;
			}
			.account-id {
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
		</style>
	</head>
	<body>
		<div class="popup-title">Scroll Companion</div>
		<div class="row">
			<span class="label status" id="feedStatus">Loading…</span>
		</div>
		<div id="scrollProgress" class="row" style="display: none">
			<span class="progress" id="scrollProgressText">0 / 100</span>
			<div class="progress-bar" style="flex: 1">
				<div id="scrollProgressFill" class="progress-fill"></div>
			</div>
		</div>
		<div class="row">
			<div class="label-wrap">
				<div class="label">X</div>
				<div class="substatus account-id" id="xAccountInfo">Checking…</div>
			</div>
			<div style="display: flex; gap: 8px; align-items: center">
				<span
					class="status"
					id="lastScrollTime"
					style="font-size: 11px; color: rgba(255, 255, 255, 0.5)"
				></span>
				<button type="button" id="scrollNow">Scroll now</button>
				<button type="button" id="connectX">Connect</button>
			</div>
		</div>
		<div class="row">
			<div class="label-wrap">
				<div class="label">Unfeed account</div>
				<div class="substatus account-id" id="unfeedAccountInfo">Checking…</div>
			</div>
			<button type="button" id="logout">Sign out</button>
		</div>
		<div class="row">
			<span class="label">Open at login</span>
			<input type="checkbox" id="openAtLogin" />
		</div>
		<div class="row actions">
			<button type="button" id="exit">Quit</button>
		</div>
		<script src="popup.js"></script>
	</body>
</html>
